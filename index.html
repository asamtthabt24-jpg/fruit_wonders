<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام الفواتير</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#16323F;
    --navy-2:#1F4757;
    --paper:#FAF6EE;
    --paper-2:#F1EADA;
    --gold:#B8873A;
    --gold-2:#D9A857;
    --ink:#20272B;
    --muted:#6B7680;
    --green:#3F7D58;
    --red:#B3432B;
    --line:#E3D9C2;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Tajawal',sans-serif;background:var(--paper);color:var(--ink);}
  #app{min-height:100vh;display:flex;flex-direction:column;}

  /* Top nav */
  .topbar{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .brand{font-weight:800;font-size:19px;letter-spacing:.3px;}
  .brand small{display:block;font-weight:400;font-size:12px;color:#C9D6DA;margin-top:2px;}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;}
  .tab{padding:8px 14px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:#DCE7EA;background:transparent;border:1px solid transparent;transition:.15s;}
  .tab:hover{background:rgba(255,255,255,.08);}
  .tab.active{background:var(--gold);color:#fff;font-weight:700;}

  .content{flex:1;padding:20px;max-width:1000px;width:100%;margin:0 auto;}

  /* Cards / generic */
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(22,50,63,.05);}
  h1{font-size:22px;margin:0 0 14px;color:var(--navy);}
  h2{font-size:18px;margin:0 0 10px;color:var(--navy);}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px;font-weight:500;}
  input[type=text],input[type=number],input[type=tel],input[type=search],select,textarea{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;background:#fff;color:var(--ink);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--gold-2);outline-offset:1px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .row > *{flex:1;min-width:150px;}
  .field{margin-bottom:12px;}

  button{cursor:pointer;font-family:inherit;font-weight:700;border:none;border-radius:9px;padding:10px 16px;font-size:14px;transition:.15s;}
  .btn-primary{background:var(--gold);color:#fff;}
  .btn-primary:hover{background:var(--gold-2);}
  .btn-navy{background:var(--navy);color:#fff;}
  .btn-navy:hover{background:var(--navy-2);}
  .btn-outline{background:transparent;border:1px solid var(--line);color:var(--navy);}
  .btn-outline:hover{background:var(--paper-2);}
  .btn-danger{background:#fff;color:var(--red);border:1px solid var(--red);}
  .btn-danger:hover{background:var(--red);color:#fff;}
  .btn-sm{padding:6px 10px;font-size:12.5px;border-radius:7px;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}

  /* Top stat banner */
  .stat-banner{background:linear-gradient(120deg,var(--navy),var(--navy-2));color:#fff;border-radius:14px;padding:18px 22px;margin-bottom:18px;display:flex;gap:26px;flex-wrap:wrap;align-items:center;}
  .stat{min-width:140px;}
  .stat .num{font-size:26px;font-weight:800;color:var(--gold-2);}
  .stat .lbl{font-size:12.5px;color:#C9D6DA;margin-top:2px;}

  /* Lists */
  .list-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;background:#fff;cursor:pointer;transition:.15s;}
  .list-item:hover{border-color:var(--gold-2);background:var(--paper-2);}
  .li-main{font-weight:700;color:var(--navy);}
  .li-sub{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .li-right{text-align:left;}
  .li-price{font-weight:800;color:var(--gold);font-size:15px;}

  .empty{text-align:center;padding:40px 10px;color:var(--muted);}
  .empty b{display:block;color:var(--navy);font-size:16px;margin-bottom:6px;}

  /* Item picker */
  .item-row{display:flex;gap:8px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;background:#fff;}
  .item-row .name{flex:2;font-weight:600;}
  .item-row .price{flex:1;color:var(--gold);font-weight:700;}
  .cart-line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--line);}
  .qty-box{display:flex;align-items:center;gap:6px;}
  .qty-box button{width:26px;height:26px;padding:0;border-radius:6px;}

  /* Invoice paper */
  .invoice-paper{background:#fff;border:1px solid var(--line);border-radius:6px;padding:26px 30px;position:relative;}
  .invoice-paper::before,.invoice-paper::after{content:'';display:none;}
  .inv-notch-top{position:relative;height:16px;margin:-26px -30px 20px -30px;background:
    radial-gradient(circle at 12px 8px, transparent 8px, #fff 8px) repeat-x;
    background-size:24px 16px;}
  .inv-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--navy);padding-bottom:14px;margin-bottom:16px;}
  .inv-num{background:var(--navy);color:#fff;padding:6px 14px;border-radius:8px;font-weight:800;font-size:14px;letter-spacing:.5px;}
  .inv-dates{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.7;}
  .inv-company{text-align:left;}
  .inv-company .c-name{font-weight:800;color:var(--navy);font-size:16px;}
  .inv-company .c-tax{font-size:12px;color:var(--muted);}
  .inv-parties{display:flex;justify-content:space-between;gap:16px;margin-bottom:18px;}
  .party{background:var(--paper-2);border-radius:10px;padding:10px 14px;flex:1;}
  .party .p-label{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:3px;}
  .party .p-name{font-weight:700;color:var(--navy);}
  .party .p-tax{font-size:12px;color:var(--muted);}
  table.inv-table{width:100%;border-collapse:collapse;margin-bottom:16px;}
  table.inv-table th{background:var(--navy);color:#fff;padding:9px 10px;font-size:13px;text-align:right;}
  table.inv-table th:first-child{border-radius:8px 0 0 0;}
  table.inv-table th:last-child{border-radius:0 8px 0 0;}
  table.inv-table td{padding:9px 10px;border-bottom:1px solid var(--line);font-size:13.5px;}
  table.inv-table tr:last-child td{border-bottom:none;}
  .inv-totals{display:flex;justify-content:flex-end;margin-bottom:18px;}
  .totals-box{width:280px;}
  .totals-box .t-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:var(--muted);}
  .totals-box .t-final{display:flex;justify-content:space-between;padding:10px 14px;background:var(--gold);color:#fff;border-radius:10px;font-weight:800;font-size:17px;margin-top:6px;}
  .totals-box .t-old{font-size:12px;color:var(--red);text-decoration:line-through;text-align:left;}
  .inv-sign{display:flex;justify-content:space-between;align-items:flex-end;margin-top:26px;gap:20px;}
  .sign-box{flex:1;}
  .sign-box .sl{font-size:12px;color:var(--muted);margin-bottom:6px;}
  canvas.sig-pad{border:1px dashed var(--line);border-radius:8px;background:#fdfcf9;touch-action:none;width:100%;max-width:260px;height:90px;display:block;}

  .tax-toggle{display:flex;align-items:center;gap:8px;font-size:14px;}
  .search-bar{margin-bottom:14px;}

  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:700;}
  .badge-green{background:#E5F1E9;color:var(--green);}
  .badge-gold{background:#FBF0DD;color:var(--gold);}

  @media print{
    .topbar,.no-print,.tabs{display:none !important;}
    body{background:#fff;}
    .content{padding:0;max-width:100%;}
    .card{border:none;box-shadow:none;padding:0;}
    .invoice-paper{border:none;}
  }
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:9999;box-shadow:0 6px 18px rgba(0,0,0,.25);max-width:90%;text-align:center;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .btn-confirm{background:var(--red) !important;color:#fff !important;}

  @media (max-width:640px){
    .inv-parties{flex-direction:column;}
    .inv-head{flex-direction:column;gap:10px;}
    .inv-company{text-align:right;}
    .stat-banner{padding:14px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ===================== SUPABASE CONNECTION ===================== */
const SUPABASE_URL = 'https://xjocljbzhtuhvinnfgih.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhqb2NsamJ6aHR1aHZpbm5mZ2loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzM2NDYsImV4cCI6MjA5MTc0OTY0Nn0.cXdeSTixpn8_B1jAPFrzTrjnNh7ZYDlpIMYUVUA-vp4';
const SB_HEADERS = {
  apikey: SUPABASE_KEY,
  Authorization: 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json'
};

let DATA = null;
let isOnline = true;

function defaultData(){
  return {
    setup:{done:false, companyName:'', taxNumber:''},
    customers:[],
    items:[],
    invoices:[],
    orders:[],
    losses:[],
    funds:[]
  };
}

async function loadData(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/shop_data?id=eq.main&select=data`, {
      headers: SB_HEADERS
    });
    if(!res.ok) throw new Error('fetch failed: '+res.status);
    const rows = await res.json();
    if(rows && rows[0] && rows[0].data && Object.keys(rows[0].data).length){
      DATA = rows[0].data;
    } else {
      DATA = defaultData();
    }
    isOnline = true;
  }catch(e){
    console.error('تعذر تحميل البيانات من Supabase', e);
    isOnline = false;
    DATA = DATA || defaultData();
  }
  // fill in any missing fields (for forward compatibility)
  const d = defaultData();
  for(const k in d){ if(!(k in DATA)) DATA[k] = d[k]; }
}

async function saveData(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/shop_data?id=eq.main`, {
      method:'PATCH',
      headers: Object.assign({Prefer:'return=minimal'}, SB_HEADERS),
      body: JSON.stringify({data: DATA, updated_at: new Date().toISOString()})
    });
    if(!res.ok) throw new Error('save failed: '+res.status);
    isOnline = true;
  }catch(e){
    console.error('تعذر الحفظ في Supabase', e);
    isOnline = false;
    toast('⚠️ تعذر الحفظ — تحقق من اتصال الإنترنت');
  }
}

async function refreshFromServer(){
  await loadData();
  render();
}

/* ===================== APP STATE ===================== */
const state = {
  view:'invoices',
  params:{},
  draft:null // temp invoice/order being built
};

function go(view, params={}){
  state.view = view;
  state.params = params;
  render();
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function randInvoiceNumber(){
  let n;
  do{ n = 'INV-'+Math.floor(100000+Math.random()*900000); }
  while(DATA.invoices.some(i=>i.number===n));
  return n;
}
function fmtMoney(n){ return (Math.round((n||0)*100)/100).toLocaleString('ar-SA',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('ar-SA',{year:'numeric',month:'2-digit',day:'2-digit'})+' '+d.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
}
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let toastTimer = null;
function toast(msg){
  let el = document.getElementById('toast');
  if(!el){
    el = document.createElement('div');
    el.id = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> el.classList.remove('show'), 2600);
}

/* ===================== CALCULATIONS ===================== */
function invoiceTotals(items, taxRate){
  const subtotal = items.reduce((s,it)=> s + (it.price*it.qty), 0);
  const tax = subtotal * (taxRate/100);
  const total = subtotal + tax;
  return {subtotal,tax,total};
}
function sumInvoices(){ return DATA.invoices.reduce((s,i)=> s + (i.manualTotal!=null? i.manualTotal : i.total), 0); }
function sumOrders(){ return DATA.orders.reduce((s,o)=> s + o.total, 0); }
function sumFunds(){ return DATA.funds.reduce((s,f)=> s + f.amount, 0); }
function sumLosses(){ return DATA.losses.reduce((s,l)=> s + l.amount, 0); }
function netProfit(){ return sumInvoices() + sumOrders() + sumFunds() - sumLosses(); }

/* ===================== RENDER SHELL ===================== */
function render(){
  const app = document.getElementById('app');
  if(!DATA.setup.done){
    app.innerHTML = renderSetup();
    bindSetup();
    return;
  }

  let body = '';
  switch(state.view){
    case 'invoices': body = renderInvoicesList(); break;
    case 'invoice-items': body = renderInvoiceItemsStep(); break;
    case 'invoice-customer': body = renderInvoiceCustomerStep(); break;
    case 'invoice-detail': body = renderInvoiceDetail(); break;
    case 'customers': body = renderCustomers(); break;
    case 'customer-detail': body = renderCustomerDetail(); break;
    case 'orders': body = renderOrdersList(); break;
    case 'order-new': body = renderOrderNew(); break;
    case 'order-detail': body = renderOrderDetail(); break;
    case 'losses': body = renderLosses(); break;
    default: body = renderInvoicesList();
  }

  app.innerHTML = `
    <div class="topbar no-print">
      <div class="brand">${esc(DATA.setup.companyName)}<small>الرقم الضريبي: ${esc(DATA.setup.taxNumber || '—')}</small></div>
      <div class="tabs">
        <div class="tab ${tabActive(['invoices','invoice-items','invoice-customer','invoice-detail'])}" data-go="invoices">الفواتير</div>
        <div class="tab ${tabActive(['customers','customer-detail'])}" data-go="customers">العملاء</div>
        <div class="tab ${tabActive(['orders','order-new','order-detail'])}" data-go="orders">الطلبات أونلاين</div>
        <div class="tab ${tabActive(['losses'])}" data-go="losses">الأرباح والخسائر</div>
        <div class="tab" id="sync-btn" title="جلب أحدث البيانات من كل الأجهزة">${isOnline? '🔄 تحديث':'⚠️ غير متصل'}</div>
      </div>
    </div>
    <div class="content">${body}</div>
  `;
  document.querySelectorAll('[data-go]').forEach(el=>{
    el.addEventListener('click', ()=> go(el.getAttribute('data-go')));
  });
  const syncBtn = document.getElementById('sync-btn');
  if(syncBtn) syncBtn.addEventListener('click', async ()=>{ await refreshFromServer(); toast('تم التحديث'); });
  bindViewEvents();
}
function tabActive(list){ return list.includes(state.view) ? 'active' : ''; }

/* ===================== SETUP (first run) ===================== */
function renderSetup(){
  return `
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);">
    <div class="card" style="max-width:420px;width:92%;">
      <h1>مرحباً بك 👋</h1>
      <p style="color:var(--muted);font-size:14px;margin-top:-8px;">هذه الخطوة تظهر مرة واحدة فقط لإعداد بيانات شركتك، وستظهر في كل فاتورة تصدرها.</p>
      <div class="field">
        <label>اسم الشركة</label>
        <input type="text" id="su-name" placeholder="مثال: مؤسسة النخبة التجارية">
      </div>
      <div class="field">
        <label>الرقم الضريبي</label>
        <input type="text" id="su-tax" placeholder="3XXXXXXXXXXXXX">
      </div>
      <button class="btn-primary" id="su-save" style="width:100%;">بدء استخدام النظام</button>
    </div>
  </div>`;
}
function bindSetup(){
  document.getElementById('su-save').addEventListener('click', async ()=>{
    const name = document.getElementById('su-name').value.trim();
    const tax = document.getElementById('su-tax').value.trim();
    if(!name){ toast('الرجاء إدخال اسم الشركة'); return; }
    DATA.setup = {done:true, companyName:name, taxNumber:tax};
    await saveData();
    render();
  });
}

/* ===================== INVOICES LIST ===================== */
function renderInvoicesList(){
  const q = state.params.q || '';
  let list = DATA.invoices.slice().sort((a,b)=> b.updatedAt - a.updatedAt);
  if(q){
    const ql = q.toLowerCase();
    list = list.filter(i =>
      (i.customerName||'').toLowerCase().includes(ql) ||
      (i.number||'').toLowerCase().includes(ql) ||
      fmtDate(i.createdAt).includes(q) ||
      fmtDate(i.updatedAt).includes(q)
    );
  }
  const total = sumInvoices();
  return `
    <div class="stat-banner">
      <div class="stat"><div class="num">${fmtMoney(total)}</div><div class="lbl">إجمالي كل الفواتير (ريال)</div></div>
      <div class="stat"><div class="num">${DATA.invoices.length}</div><div class="lbl">عدد الفواتير</div></div>
      <div style="margin-inline-start:auto;">
        <button class="btn-primary" data-go="invoice-items">+ فاتورة جديدة</button>
      </div>
    </div>
    <div class="card">
      <input type="search" id="inv-search" class="search-bar" placeholder="ابحث باسم العميل، رقم الفاتورة، أو التاريخ..." value="${esc(q)}">
      ${list.length? list.map(inv=>{
        const disp = inv.manualTotal!=null? inv.manualTotal : inv.total;
        return `<div class="list-item" data-open-invoice="${inv.id}">
          <div>
            <div class="li-main">${esc(inv.customerName)} <span class="badge badge-gold">${inv.number}</span></div>
            <div class="li-sub">أُنشئت: ${fmtDate(inv.createdAt)} · آخر تعديل: ${fmtDate(inv.updatedAt)}</div>
          </div>
          <div class="li-right">
            <div class="li-price">${fmtMoney(disp)} ر.س</div>
            ${inv.manualTotal!=null? `<div class="li-sub" style="color:var(--red);">معدّلة يدوياً</div>`:''}
          </div>
        </div>`;
      }).join('') : `<div class="empty"><b>لا توجد فواتير</b>ابدأ بإنشاء فاتورتك الأولى</div>`}
    </div>
  `;
}

/* ===================== INVOICE STEP 1: ITEMS ===================== */
function renderInvoiceItemsStep(){
  if(!state.draft || state.draft.type!=='invoice'){
    state.draft = {type:'invoice', items:[], taxRate:15, taxOn:true};
  }
  const d = state.draft;
  const catQ = (state._catQ||'').toLowerCase();
  const catalog = DATA.items.filter(it => !catQ ||
    it.name.toLowerCase().includes(catQ) || String(it.price).includes(catQ));

  return `
    <h1>فاتورة جديدة — الخطوة 1: الأصناف</h1>
    <div class="card">
      <div class="row">
        <div class="field"><label>اسم الصنف</label><input type="text" id="new-item-name" placeholder="مثال: طاولة خشبية"></div>
        <div class="field" style="max-width:140px;"><label>السعر</label><input type="number" id="new-item-price" placeholder="0.00"></div>
        <div class="field" style="max-width:100px;"><label>الكمية</label><input type="number" id="new-item-qty" value="1" min="1"></div>
      </div>
      <button class="btn-navy btn-sm" id="add-new-item">+ إضافة الصنف للفاتورة</button>

      <div style="margin-top:16px;">
        <label>أو اختر من الأصناف المحفوظة (ابحث بالاسم أو السعر)</label>
        <input type="search" id="cat-search" placeholder="بحث..." value="${esc(state._catQ||'')}">
        <div style="margin-top:8px;max-height:180px;overflow:auto;">
          ${catalog.length? catalog.map(it=>`
            <div class="item-row">
              <div class="name">${esc(it.name)}</div>
              <div class="price">${fmtMoney(it.price)} ر.س</div>
              <button class="btn-outline btn-sm" data-add-catalog="${it.id}">إضافة</button>
            </div>`).join('') : `<div style="color:var(--muted);font-size:13px;padding:8px;">لا توجد أصناف مطابقة</div>`}
        </div>
      </div>
    </div>

    <div class="card">
      <h2>أصناف الفاتورة الحالية</h2>
      ${d.items.length? d.items.map((it,idx)=>`
        <div class="cart-line">
          <div>${esc(it.name)} <span style="color:var(--muted);font-size:12px;">(${fmtMoney(it.price)} ر.س)</span></div>
          <div class="qty-box">
            <button class="btn-outline" data-qty-dec="${idx}">−</button>
            <span>${it.qty}</span>
            <button class="btn-outline" data-qty-inc="${idx}">+</button>
            <b style="min-width:70px;text-align:left;">${fmtMoney(it.price*it.qty)}</b>
            <button class="btn-danger btn-sm" data-remove-item="${idx}">حذف</button>
          </div>
        </div>`).join('') : `<div class="empty">لم تُضف أصناف بعد</div>`}

      <div class="field" style="margin-top:14px;">
        <label class="tax-toggle"><input type="checkbox" id="tax-on" ${d.taxOn?'checked':''}> إضافة ضريبة القيمة المضافة</label>

/* ===================== EVENT BINDING PER VIEW ===================== */
function bindViewEvents(){
  // Invoices list
  const invSearch = document.getElementById('inv-search');
  if(invSearch){
    invSearch.addEventListener('input', e=> go('invoices',{q:e.target.value}));
  }
  document.querySelectorAll('[data-open-invoice]').forEach(el=>{
    el.addEventListener('click', ()=> go('invoice-detail',{id:el.getAttribute('data-open-invoice')}));
  });

  // Invoice step 1 (items)
  const addNewItem = document.getElementById('add-new-item');
  if(addNewItem){
    addNewItem.addEventListener('click', ()=>{
      const name = document.getElementById('new-item-name').value.trim();
      const price = parseFloat(document.getElementById('new-item-price').value)||0;
      const qty = parseInt(document.getElementById('new-item-qty').value)||1;
      if(!name || price<=0){ toast('أدخل اسم وسعر صحيحين'); return; }
      state.draft.items.push({name,price,qty});
      // save to catalog if not exists
      if(!DATA.items.some(it=>it.name===name)){
        DATA.items.push({id:uid(),name,price});
        saveData();
      }
      render();
    });
  }
  const catSearch = document.getElementById('cat-search');
  if(catSearch){
    catSearch.addEventListener('input', e=>{ state._catQ = e.target.value; render(); });
  }
  document.querySelectorAll('[data-add-catalog]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const it = DATA.items.find(x=>x.id===el.getAttribute('data-add-catalog'));
      if(it) state.draft.items.push({name:it.name, price:it.price, qty:1});
      render();
    });
  });
  document.querySelectorAll('[data-qty-inc]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.draft.items[+el.getAttribute('data-qty-inc')].qty++; render(); });
  });
  document.querySelectorAll('[data-qty-dec]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const idx = +el.getAttribute('data-qty-dec');
      if(state.draft.items[idx].qty>1) state.draft.items[idx].qty--;
      render();
    });
  });
  document.querySelectorAll('[data-remove-item]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.draft.items.splice(+el.getAttribute('data-remove-item'),1); render(); });
  });
  const taxOn = document.getElementById('tax-on');
  if(taxOn){
    taxOn.addEventListener('change', e=>{ state.draft.taxOn = e.target.checked; render(); });
  }
  const taxRate = document.getElementById('tax-rate');
  if(taxRate){
    taxRate.addEventListener('input', e=>{ state.draft.taxRate = parseFloat(e.target.value)||0; });
  }
  const itemsNext = document.getElementById('items-next');
  if(itemsNext){
    itemsNext.addEventListener('click', ()=>{
      if(!state.draft.taxOn) state.draft.taxRate = 0;
      go('invoice-customer');
    });
  }

  // Invoice step 2 (customer)
  const custSearch = document.getElementById('cust-search');
  if(custSearch){
    custSearch.addEventListener('input', e=>{ state._custQ = e.target.value; render(); });
  }
  document.querySelectorAll('[data-pick-customer]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const c = DATA.customers.find(x=>x.id===el.getAttribute('data-pick-customer'));
      if(c){ state.draft.customerId=c.id; state.draft.customerName=c.name; state.draft.customerTax=c.taxNumber; }
      render();
    });
  });
  const useNewCustomer = document.getElementById('use-new-customer');
  if(useNewCustomer){
    useNewCustomer.addEventListener('click', ()=>{
      const name = document.getElementById('new-cust-name').value.trim();
      const tax = document.getElementById('new-cust-tax').value.trim();
      if(!name){ toast('أدخل اسم العميل'); return; }
      let c = DATA.customers.find(x=>x.name===name);
      if(!c){
        c = {id:uid(), name, taxNumber:tax, createdAt:Date.now()};
        DATA.customers.push(c);
      }
      state.draft.customerId = c.id;
      state.draft.customerName = c.name;
      state.draft.customerTax = c.taxNumber;
      render();
    });
  }
  const saveInvoiceBtn = document.getElementById('save-invoice');
  if(saveInvoiceBtn){
    saveInvoiceBtn.addEventListener('click', async ()=>{
      const d = state.draft;
      const totals = invoiceTotals(d.items, d.taxRate||0);
      const now = Date.now();
      const inv = {
        id: uid(),
        number: randInvoiceNumber(),
        customerId: d.customerId||null,
        customerName: d.customerName,
        customerTax: d.customerTax||'',
        items: d.items,
        taxRate: d.taxRate||0,
        subtotal: totals.subtotal,
        tax: totals.tax,
        total: totals.total,
        manualTotal: null,
        signature: null,
        createdAt: now,
        updatedAt: now
      };
      DATA.invoices.push(inv);
      state.draft = null;
      await saveData();
      go('invoice-detail',{id:inv.id});
    });
  }

  // Invoice detail
  const printBtn = document.getElementById('print-inv');
  if(printBtn) printBtn.addEventListener('click', ()=> printInvoice(state.params.id));
  const deleteInv = document.getElementById('delete-inv');
  if(deleteInv){
    deleteInv.addEventListener('click', async ()=>{
      if(state._confirmDelInv !== state.params.id){
        state._confirmDelInv = state.params.id;
        render();
        return;
      }
      DATA.invoices = DATA.invoices.filter(i=>i.id!==state.params.id);
      state._confirmDelInv = null;
      await saveData();
      toast('تم حذف الفاتورة');
      go('invoices');
    });
  }
  const addItemToInv = document.getElementById('add-item-to-inv');
  if(addItemToInv){
    addItemToInv.addEventListener('click', async ()=>{
      const inv = DATA.invoices.find(i=>i.id===state.params.id);
      const name = document.getElementById('add-item-name').value.trim();
      const price = parseFloat(document.getElementById('add-item-price').value)||0;
      const qty = parseInt(document.getElementById('add-item-qty').value)||1;
      if(!name||price<=0){ toast('أدخل اسم وسعر صحيحين'); return; }
      inv.items.push({name,price,qty});
      if(!DATA.items.some(it=>it.name===name)) DATA.items.push({id:uid(),name,price});
      recalcInvoice(inv);
      await saveData();
      render();
    });
  }
  document.querySelectorAll('[data-inv-remove-item]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const inv = DATA.invoices.find(i=>i.id===state.params.id);
      inv.items.splice(+el.getAttribute('data-inv-remove-item'),1);
      recalcInvoice(inv);
      await saveData();
      render();
    });
  });
  const applyManual = document.getElementById('apply-manual-price');
  if(applyManual){
    applyManual.addEventListener('click', async ()=>{
      const inv = DATA.invoices.find(i=>i.id===state.params.id);
      const discount = parseFloat(document.getElementById('manual-price').value);
      if(isNaN(discount) || discount<0){ toast('أدخل مبلغ خصم صحيح'); return; }
      if(discount > inv.total){ toast('مبلغ الخصم أكبر من إجمالي الفاتورة'); return; }
      inv.manualTotal = inv.total - discount;
      inv.updatedAt = Date.now();
      await saveData();
      toast('تم تطبيق الخصم');
      render();
    });
  }
  const revertPrice = document.getElementById('revert-price');
  if(revertPrice){
    revertPrice.addEventListener('click', async ()=>{
      const inv = DATA.invoices.find(i=>i.id===state.params.id);
      inv.manualTotal = null;
      inv.updatedAt = Date.now();
      await saveData();
      toast('تم استرجاع السعر الأصلي');
      render();
    });
  }
  // signature pad
  const sigPad = document.getElementById('sig-pad');
  if(sigPad) initSignaturePad(sigPad, state.params.id);
  const clearSig = document.getElementById('clear-sig');
  if(clearSig){
    clearSig.addEventListener('click', async ()=>{
      const ctx = sigPad.getContext('2d');
      ctx.clearRect(0,0,sigPad.width,sigPad.height);
      const inv = DATA.invoices.find(i=>i.id===state.params.id);
      inv.signature = null;
      await saveData();
    });
  }

  // Customers
  const cnewSave = document.getElementById('cnew-save');
  if(cnewSave){
    cnewSave.addEventListener('click', async ()=>{
      const name = document.getElementById('cnew-name').value.trim();
      const tax = document.getElementById('cnew-tax').value.trim();
      if(!name){ toast('أدخل اسم العميل'); return; }
      DATA.customers.push({id:uid(),name,taxNumber:tax,createdAt:Date.now()});
      await saveData();
      go('customers');
    });
  }
  const custListSearch = document.getElementById('cust-list-search');
  if(custListSearch){
    custListSearch.addEventListener('input', e=> go('customers',{q:e.target.value}));
  }
  document.querySelectorAll('[data-open-customer]').forEach(el=>{
    el.addEventListener('click', ()=> go('customer-detail',{id:el.getAttribute('data-open-customer')}));
  });

  // Orders
  const orderSearch = document.getElementById('order-search');
  if(orderSearch) orderSearch.addEventListener('input', e=> go('orders',{q:e.target.value}));
  document.querySelectorAll('[data-open-order]').forEach(el=>{
    el.addEventListener('click', ()=> go('order-detail',{id:el.getAttribute('data-open-order')}));
  });
  const oAddItem = document.getElementById('o-add-item');
  if(oAddItem){
    oAddItem.addEventListener('click', ()=>{
      const name = document.getElementById('o-item-name').value.trim();
      const price = parseFloat(document.getElementById('o-item-price').value)||0;
      const qty = parseInt(document.getElementById('o-item-qty').value)||1;
      if(!name||price<=0){ toast('أدخل اسم وسعر صحيحين'); return; }
      state.draft.items.push({name,price,qty});
      render();
    });
  }
  document.querySelectorAll('[data-o-remove]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.draft.items.splice(+el.getAttribute('data-o-remove'),1); render(); });
  });
  const oName = document.getElementById('o-name');
  if(oName) oName.addEventListener('input', e=> state.draft.customerName = e.target.value);
  const oPhone = document.getElementById('o-phone');
  if(oPhone) oPhone.addEventListener('input', e=> state.draft.phone = e.target.value);
  const oSave = document.getElementById('o-save');
  if(oSave){
    oSave.addEventListener('click', async ()=>{
      const d = state.draft;
      const total = d.items.reduce((s,i)=>s+i.price*i.qty,0);
      const order = {id:uid(), customerName:d.customerName, phone:d.phone, items:d.items, total, createdAt:Date.now()};
      DATA.orders.push(order);
      state.draft = null;
      await saveData();
      go('order-detail',{id:order.id});
    });
  }
  const deleteOrder = document.getElementById('delete-order');
  if(deleteOrder){
    deleteOrder.addEventListener('click', async ()=>{
      if(state._confirmDelOrder !== state.params.id){
        state._confirmDelOrder = state.params.id;
        render();
        return;
      }
      DATA.orders = DATA.orders.filter(o=>o.id!==state.params.id);
      state._confirmDelOrder = null;
      await saveData();
      toast('تم حذف الطلب');
      go('orders');
    });
  }

  // Losses & funds
  const lossAdd = document.getElementById('loss-add');
  if(lossAdd){
    lossAdd.addEventListener('click', async ()=>{
      const desc = document.getElementById('loss-desc').value.trim();
      const amount = parseFloat(document.getElementById('loss-amount').value)||0;
      if(!desc||amount<=0){ toast('أدخل وصفاً ومبلغاً صحيحين'); return; }
      DATA.losses.push({id:uid(),desc,amount,date:Date.now()});
      await saveData();
      go('losses');
    });
  }
  const fundAdd = document.getElementById('fund-add');
  if(fundAdd){
    fundAdd.addEventListener('click', async ()=>{
      const desc = document.getElementById('fund-desc').value.trim();
      const amount = parseFloat(document.getElementById('fund-amount').value)||0;
      if(!desc||amount<=0){ toast('أدخل وصفاً ومبلغاً صحيحين'); return; }
      DATA.funds.push({id:uid(),desc,amount,date:Date.now()});
      await saveData();
      go('losses');
    });
  }
  document.querySelectorAll('[data-del-loss]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      DATA.losses = DATA.losses.filter(l=>l.id!==el.getAttribute('data-del-loss'));
      await saveData(); go('losses');
    });
  });
  document.querySelectorAll('[data-del-fund]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      DATA.funds = DATA.funds.filter(f=>f.id!==el.getAttribute('data-del-fund'));
      await saveData(); go('losses');
    });
  });
}

/* ===================== PRINTING ===================== */
function printInvoice(invoiceId){
  const inv = DATA.invoices.find(i=>i.id===invoiceId);
  if(!inv){ toast('الفاتورة غير موجودة'); return; }
  const displayTotal = inv.manualTotal!=null ? inv.manualTotal : inv.total;

  const html = `<!DOCTYPE html>
  <html lang="ar" dir="rtl"><head><meta charset="UTF-8">
  <title>فاتورة ${esc(inv.number)}</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>

    .inv-num{background:#16323F;color:#fff;padding:6px 14px;border-radius:8px;font-weight:800;font-size:14px;}
    .inv-dates{font-size:12px;color:#6B7680;margin-top:8px;line-height:1.7;}
    .inv-company{text-align:left;}
    .inv-company .c-name{font-weight:800;color:#16323F;font-size:16px;}
    .inv-company .c-tax{font-size:12px;color:#6B7680;}
    .party{background:#F1EADA;border-radius:10px;padding:10px 14px;margin-bottom:18px;}
    .party .p-label{font-size:11px;color:#6B7680;font-weight:700;margin-bottom:3px;}
    .party .p-name{font-weight:700;color:#16323F;}
    .party .p-tax{font-size:12px;color:#6B7680;}
    table{width:100%;border-collapse:collapse;margin-bottom:16px;}
    th{background:#16323F;color:#fff;padding:9px 10px;font-size:13px;text-align:right;}
    td{padding:9px 10px;border-bottom:1px solid #E3D9C2;font-size:13.5px;}
    .inv-totals{display:flex;justify-content:flex-end;margin-bottom:18px;}
    .totals-box{width:280px;}
    .t-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:#6B7680;}
    .t-final{display:flex;justify-content:space-between;padding:10px 14px;background:#B8873A;color:#fff;border-radius:10px;font-weight:800;font-size:17px;margin-top:6px;}
    .t-old{font-size:12px;color:#B3432B;text-decoration:line-through;text-align:left;}
    .inv-sign{display:flex;justify-content:space-between;align-items:flex-end;margin-top:26px;}
    .sl{font-size:12px;color:#6B7680;margin-bottom:6px;}
    img.sig{max-width:220px;max-height:90px;border-bottom:1px solid #20272B;}
    @media print{ body{padding:0;} }
  </style></head>
  <body>
    <div class="inv-head">
      <div>
        <div class="inv-num">${esc(inv.number)}</div>
        <div class="inv-dates">تاريخ الإنشاء: ${fmtDate(inv.createdAt)}<br>آخر تعديل: ${fmtDate(inv.updatedAt)}</div>
      </div>
      <div class="inv-company">
        <div class="c-name">${esc(DATA.setup.companyName)}</div>
        <div class="c-tax">الرقم الضريبي: ${esc(DATA.setup.taxNumber||'—')}</div>
      </div>
    </div>
    <div class="party">
      <div class="p-label">فاتورة إلى</div>
      <div class="p-name">${esc(inv.customerName)}</div>
      <div class="p-tax">الرقم الضريبي: ${esc(inv.customerTax||'—')}</div>
    </div>
    <table>
      <thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
      <tbody>
        ${inv.items.map(it=>`<tr><td>${esc(it.name)}</td><td>${it.qty}</td><td>${fmtMoney(it.price)}</td><td>${fmtMoney(it.price*it.qty)}</td></tr>`).join('')}
      </tbody>
    </table>
    <div class="inv-totals">
      <div class="totals-box">
        <div class="t-row"><span>الإجمالي قبل الضريبة</span><span>${fmtMoney(inv.subtotal)} ر.س</span></div>
        <div class="t-row"><span>الضريبة (${inv.taxRate}%)</span><span>${fmtMoney(inv.tax)} ر.س</span></div>
        ${inv.manualTotal!=null? `<div class="t-old">السعر الأصلي: ${fmtMoney(inv.total)} ر.س</div>`:''}

    return;
  }
  win.document.open();
  win.document.write(html);
  win.document.close();
}

function recalcInvoice(inv){
  const totals = invoiceTotals(inv.items, inv.taxRate);
  inv.subtotal = totals.subtotal;
  inv.tax = totals.tax;
  inv.total = totals.total;
  inv.manualTotal = null; // editing items resets manual override
  inv.updatedAt = Date.now();
}

/* ===================== SIGNATURE PAD ===================== */
function initSignaturePad(canvas, invoiceId){
  const ctx = canvas.getContext('2d');
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#16323F';
  ctx.lineCap = 'round';
  const inv = DATA.invoices.find(i=>i.id===invoiceId);
  if(inv && inv.signature){
    const img = new Image();
    img.onload = ()=> ctx.drawImage(img,0,0);
    img.src = inv.signature;
  }
  let drawing = false;
  function pos(e){
    const r = canvas.getBoundingClientRect();
    const cx = (e.touches? e.touches[0].clientX : e.clientX) - r.left;
    const cy = (e.touches? e.touches[0].clientY : e.clientY) - r.top;
    return {x: cx*(canvas.width/r.width), y: cy*(canvas.height/r.height)};
  }
  function start(e){ drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }
  function move(e){ if(!drawing) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); }
  function end(){ if(!drawing) return; drawing=false; const inv2=DATA.invoices.find(i=>i.id===invoiceId); if(inv2){ inv2.signature = canvas.toDataURL(); saveData(); } }
  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start);
  canvas.addEventListener('touchmove', move);
  canvas.addEventListener('touchend', end);
}

(async function(){
  await loadData();
  render();
  setInterval(async ()=>{

      await loadData();
      render();
    }
  }, 15000);
})();
